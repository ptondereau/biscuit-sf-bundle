name: Bug report
description: Report a bug or unexpected behavior in the bundle
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report. Before opening, please make sure no existing issue covers your problem.

        For security vulnerabilities, do not open a public issue. See [SECURITY.md](../../SECURITY.md).

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: A minimal set of steps that triggers the bug. Include code snippets, config, and sample tokens (redacted) where relevant.
      placeholder: |
        1. Configure ...
        2. Issue token with ...
        3. Call endpoint ...
        4. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: Include error messages, stack traces, or relevant log output.
    validations:
      required: true

  - type: input
    id: bundle-version
    attributes:
      label: Bundle version
      placeholder: "0.1.0"
    validations:
      required: true

  - type: input
    id: php-version
    attributes:
      label: PHP version
      placeholder: "8.3.10"
    validations:
      required: true

  - type: input
    id: symfony-version
    attributes:
      label: Symfony version
      placeholder: "7.4.0"
    validations:
      required: true

  - type: input
    id: extension-version
    attributes:
      label: biscuit-php extension version
      placeholder: "0.4.0"
    validations:
      required: true
