name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  tests:
    name: PHP ${{ matrix.php }} / Symfony ${{ matrix.symfony }}${{ matrix.deps == 'lowest' && ' (lowest)' || '' }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - { php: '8.1', symfony: '6.4.*' }
          - { php: '8.2', symfony: '6.4.*' }
          - { php: '8.3', symfony: '6.4.*' }
          - { php: '8.4', symfony: '6.4.*' }
          - { php: '8.5', symfony: '6.4.*' }
          - { php: '8.2', symfony: '7.4.*' }
          - { php: '8.3', symfony: '7.4.*' }
          - { php: '8.4', symfony: '7.4.*' }
          - { php: '8.5', symfony: '7.4.*' }
          - { php: '8.4', symfony: '8.0.*' }
          - { php: '8.5', symfony: '8.0.*' }
          - { php: '8.1', symfony: '6.4.*', deps: 'lowest' }
          - { php: '8.2', symfony: '7.4.*', deps: 'lowest' }
          - { php: '8.4', symfony: '8.0.*', deps: 'lowest' }

    steps:
      - uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          tools: pie, composer:v2
          coverage: none
        env:
          fail-fast: true

      - name: Install biscuit-php extension
        run: sudo pie install ptondereau/biscuit-php:0.4.0 --no-interaction --auto-install-build-tools --auto-install-system-dependencies

      - name: Constrain Symfony version
        run: |
          composer require --no-update --no-interaction \
            "symfony/framework-bundle:${{ matrix.symfony }}" \
            "symfony/security-bundle:${{ matrix.symfony }}" \
            "symfony/config:${{ matrix.symfony }}" \
            "symfony/dependency-injection:${{ matrix.symfony }}" \
            "symfony/console:${{ matrix.symfony }}"
          composer require --no-update --no-interaction --dev \
            "symfony/cache:${{ matrix.symfony }}" \
            "symfony/web-profiler-bundle:${{ matrix.symfony }}" \
            "symfony/yaml:${{ matrix.symfony }}"

      - name: Install dependencies
        uses: ramsey/composer-install@v3
        with:
          dependency-versions: ${{ matrix.deps == 'lowest' && 'lowest' || 'highest' }}

      - name: Run quality gate
        run: composer check
